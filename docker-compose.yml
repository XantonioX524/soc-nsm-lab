services:
  # ==========================================
  # VÍCTIMA 1: Servidor Web Frontend (CMD, XSS, Upload)
  # ==========================================
  victima_web:
    image: ubuntu:latest
    container_name: lab_victima_web
    ports:
      - "8081:80"
    networks:
      - red_laboratorio
    volumes:
      - ./logs_apache/web:/var/log/apache2 # Expone los logs al Ubuntu host
    command:
      - /bin/bash
      - -c
      - |
        apt-get update -qq
        DEBIAN_FRONTEND=noninteractive apt-get install -y apache2 php libapache2-mod-php iputils-ping -qq

        mkdir -p /var/www/html/assets /var/www/html/servicios /var/www/html/busqueda /var/www/html/marketing/content
        chmod 777 /var/www/html/marketing/content

        mkdir -p /var/www/html/confidencial
        echo "MegaCorpFlag" > /var/www/html/confidencial/secreto.txt
        chmod 755 /var/www/html/confidencial

        cat << 'EOF' > /var/www/html/assets/style.css
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f4f7f6;color:#333;margin:0;padding:20px}
        .container{max-width:800px;margin:0 auto;background:#fff;padding:30px;border-radius:8px;box-shadow:0 4px 8px rgba(0,0,0,0.1)}
        h1,h2{color:#2c3e50} input[type=text],input[type=file]{width:95%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:4px}
        input[type=submit]{background:#3498db;color:#fff;border:none;padding:10px 20px;cursor:pointer;border-radius:4px}
        pre{background:#2c3e50;color:#ecf0f1;padding:15px;border-radius:4px;overflow-x:auto}
        a{color:#3498db;text-decoration:none;font-weight:bold} a:hover{text-decoration:underline;}
        .alert{padding:15px; background:#e74c3c; color:white; border-radius:4px;}
        EOF

        cat << 'EOF' > /var/www/html/index.html
        <!DOCTYPE html>
        <html><head><meta charset="UTF-8"><title>MegaCorp Intranet</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="container">
        <h1>Portal Interno - MegaCorp</h1><p>Enlaces rápidos de la intranet:</p><hr>
        <ul><li><a href="/servicios/diagnostico.php">Herramienta de Verificación de Red Interna</a></li>
        <li><a href="/busqueda/index.php">Buscador de la Wiki de Conocimiento</a></li>
        <li><a href="/marketing/upload.php">Subida de Recursos para Campañas</a></li></ul>
        </div></body></html>
        EOF

        cat << 'EOF' > /var/www/html/servicios/diagnostico.php
        <!DOCTYPE html>
        <html><head><meta charset="UTF-8"><title>MegaCorp Red</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="container">
        <h2>Verificador de Conectividad Interna</h2><p>Comprobar estado de servidores remotos:</p>
        <form method="GET"><input type="text" name="target" placeholder="Ej: 192.168.1.50"><input type="submit" value="Lanzar Comprobación"></form>
        <pre><?php if(isset($$_GET['target'])){ system("ping -c 2 " . $$_GET['target']); }else{ echo "Introduce una dirección de red..."; } ?></pre>
        <br><a href="/">Volver a la Intranet</a></div></body></html>
        EOF

        cat << 'EOF' > /var/www/html/busqueda/index.php
        <!DOCTYPE html>
        <html><head><meta charset="UTF-8"><title>MegaCorp Wiki</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="container">
        <h2>Buscador de Artículos de la Wiki</h2>
        <form method="GET"><input type="text" name="query" placeholder="Buscar manuales..."><input type="submit" value="Buscar"></form>
        <?php if(isset($$_GET['query'])){ echo "<div class='alert'>No se encontraron resultados en el servidor para: <b>" . $$_GET['query'] . "</b></div>"; }else{ echo "Introduce un término."; } ?>
        <br><a href="/">Volver a la Intranet</a></div></body></html>
        EOF

        cat << 'EOF' > /var/www/html/marketing/upload.php
        <!DOCTYPE html>
        <html><head><meta charset="UTF-8"><title>Marketing MegaCorp</title><link rel="stylesheet" href="/assets/style.css"></head><body><div class="container">
        <h2>Subida de Recursos Gráficos</h2><p>Dpto. Marketing: Por favor, suba sus banners y logos aquí.</p>
        <form method="POST" enctype="multipart/form-data"><input type="file" name="file_upload"><input type="submit" value="Subir Recurso"></form>
        <?php if(isset($$_FILES['file_upload'])){ move_uploaded_file($$_FILES['file_upload']['tmp_name'], "content/" . $$_FILES['file_upload']['name']); echo "<p style='color:green;'>¡Recurso gráfico guardado con éxito! Se ha notificado al departamento.</p>"; } ?>
        <br><a href="/">Volver a la Intranet</a></div></body></html>
        EOF

        service apache2 start
        tail -f /dev/null

  # ==========================================
  # VÍCTIMA 2: Servidor Backend & Servicios (SQLi, SSH, FTP)
  # ==========================================
  victima_servicios:
    image: ubuntu:latest
    container_name: lab_victima_servicios
    ports:
      - "8082:80"
      - "2222:22"
      - "2121:21"
    networks:
      - red_laboratorio
    volumes:
      - ./logs_apache/servicios:/var/log/apache2 # Expone los logs al Ubuntu host
    command:
      - /bin/bash
      - -c
      - |
        apt-get update -qq
        DEBIAN_FRONTEND=noninteractive apt-get install -y apache2 php php-sqlite3 sqlite3 openssh-server vsftpd -qq

        mkdir -p /var/run/sshd
        echo 'root:toor' | chpasswd
        useradd -m admin && echo 'admin:admin123' | chpasswd
        useradd -m c.rodriguez && echo 'c.rodriguez:supersecreto' | chpasswd
        sed -i 's/#PermitRootLogin prohibit-password/PermitRootLogin yes/' /etc/ssh/sshd_config
        service ssh start

        useradd -m ftpuser && echo 'ftpuser:ftp123' | chpasswd
        useradd -m marketinguser && echo 'marketinguser:marketing123' | chpasswd
        service vsftpd start

        mkdir -p /var/www/html/empleados /var/www/html/recursos
        sqlite3 /var/www/html/empleados/db.sqlite "CREATE TABLE users (id INTEGER PRIMARY KEY, username TEXT, password TEXT, role TEXT); INSERT INTO users (username, password, role) VALUES ('admin', 'MegaCorpAdmin_2026!', 'SuperAdmin'); INSERT INTO users (username, password, role) VALUES ('j.doe', '123456', 'Employee'); INSERT INTO users (username, password, role) VALUES ('m.lopez', 'p@ssword', 'Manager'); INSERT INTO users (username, password, role) VALUES ('a.garcia', 'Qwerty2024!', 'Employee'); INSERT INTO users (username, password, role) VALUES ('p.sanchez', 'iloveyou', 'Analyst'); INSERT INTO users (username, password, role) VALUES ('c.rodriguez', 'supersecreto', 'Developer');"
        chmod 777 /var/www/html/empleados/db.sqlite
        chmod 777 /var/www/html/empleados

        cat << 'EOF' > /var/www/html/recursos/style.css
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:#2c3e50;color:#fff;margin:0;padding:20px}
        .container{max-width:800px;margin:0 auto;background:#34495e;padding:30px;border-radius:8px;box-shadow:0 4px 8px rgba(0,0,0,0.3)}
        h1,h2{color:#ecf0f1} input[type=text]{width:95%;padding:10px;margin:10px 0;border:none;border-radius:4px}
        input[type=submit]{background:#e74c3c;color:#fff;border:none;padding:10px 20px;cursor:pointer;border-radius:4px}
        pre{background:#111;color:#0f0;padding:15px;border-radius:4px} a{color:#e74c3c;text-decoration:none}
        EOF

        cat << 'EOF' > /var/www/html/empleados/directory.php
        <!DOCTYPE html>
        <html><head><meta charset="UTF-8"><title>Empleados MegaCorp</title><link rel="stylesheet" href="/recursos/style.css"></head><body><div class="container">
        <h2>Directorio Corporativo de Empleados</h2><p>Busca a un compañero por su nombre de usuario.</p>
        <form method="GET"><input type="text" name="user" placeholder="Ej: p.sanchez"><input type="submit" value="Buscar Información"></form>
        <pre><?php if(isset($$_GET['user'])){ $$db = new SQLite3("db.sqlite"); $$res = $$db->query("SELECT username, role FROM users WHERE username='" . $$_GET['user'] . "'"); while($$row = $$res->fetchArray(SQLITE3_ASSOC)){ print_r($$row); } }else{ echo "Introduce un nombre..."; } ?></pre>
        </div></body></html>
        EOF

        echo "<html><head><meta charset='UTF-8'><link rel='stylesheet' href='/recursos/style.css'></head><body><div class='container'><h1>Backend Server - Empleados</h1><p>Acceder al <a href='/empleados/directory.php'>Directorio de la Plantilla</a></p></div></body></html>" > /var/www/html/index.html
        service apache2 start
        tail -f /dev/null

networks:
  red_laboratorio:
    driver: bridge
